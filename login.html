<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — InvoiceFree.info</title>
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%230a0a0f'/%3E%3Crect x='16' y='10' width='32' height='44' rx='4' fill='%23c9a84c'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}html{background:#0a0a0f}
body{font-family:'Cabinet Grotesk',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;background:#0a0a0f}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 30% 20%,rgba(201,168,76,.07) 0%,transparent 60%);pointer-events:none}
.nav{background:rgba(10,10,15,.9);backdrop-filter:blur(20px);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;border-bottom:1px solid rgba(255,255,255,.06);position:relative;z-index:10}
.nav-logo{font-weight:900;font-size:1.2rem;color:#fff;text-decoration:none;display:flex;align-items:center;gap:8px}.nav-logo span{color:#c9a84c}
.nav-right a{color:rgba(255,255,255,.5);text-decoration:none;font-size:.88rem;font-weight:600;transition:color .2s}.nav-right a:hover{color:#c9a84c}
.wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;position:relative;z-index:1}
.card{background:#fff;border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 80px rgba(0,0,0,.4)}
.title{font-size:1.8rem;font-weight:900;letter-spacing:-.04em;margin-bottom:6px;color:#0a0a0f}
.subtitle{font-size:.88rem;color:#9ca3af;margin-bottom:28px}
.btn-google{display:flex;align-items:center;justify-content:center;gap:12px;padding:13px 20px;border-radius:12px;border:1.5px solid #e5e7eb;background:#fff;font-family:inherit;font-size:.95rem;font-weight:600;color:#111;cursor:pointer;transition:all .2s;width:100%;margin-bottom:20px}
.btn-google:hover{border-color:#9ca3af;background:#fafafa;transform:translateY(-1px);box-shadow:0 4px 14px rgba(0,0,0,.1)}
.btn-google:disabled{opacity:.6;cursor:wait;transform:none}
.btn-google svg{width:20px;height:20px;flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:.78rem;color:#9ca3af}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:#e5e7eb}
.fg{margin-bottom:16px}.fg label{display:block;font-size:.76rem;font-weight:700;color:#6b7280;margin-bottom:6px}
.fg input{width:100%;padding:12px 14px;border:2px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:.95rem;color:#111;outline:none;transition:border-color .2s}
.fg input:focus{border-color:#c9a84c;box-shadow:0 0 0 3px rgba(201,168,76,.1)}
.fg-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}.fg-row label{margin-bottom:0}
.fg-row a{font-size:.76rem;color:#c9a84c;text-decoration:none;font-weight:600}
.alert{padding:11px 15px;border-radius:9px;font-size:.83rem;margin-bottom:14px;display:none}
.alert.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
.alert.ok{background:#d1fae5;color:#065f46;border:1px solid #6ee7b7}
.btn-submit{width:100%;background:#0a0a0f;color:#fff;border:none;padding:14px;border-radius:50px;font-family:inherit;font-size:1rem;font-weight:800;cursor:pointer;transition:all .2s;margin-top:4px}
.btn-submit:hover{background:#1c1c2e;transform:translateY(-1px)}.btn-submit:disabled{opacity:.6;cursor:wait;transform:none}
.auth-switch{text-align:center;margin-top:18px;font-size:.86rem;color:#9ca3af}
.auth-switch a{color:#c9a84c;text-decoration:none;font-weight:700}
.loading-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,15,.75);z-index:200;align-items:center;justify-content:center;flex-direction:column;gap:16px}
.loading-overlay.show{display:flex}
.spinner{width:44px;height:44px;border:3px solid rgba(201,168,76,.25);border-top-color:#c9a84c;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{color:#fff;font-weight:600;font-size:.95rem}
</style>
<script src="lang.js" defer></script>
</head>
<body>
<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">Signing you in...</div>
</div>
<nav class="nav">
  <a href="index.html" class="nav-logo">
    <svg width="22" height="22" viewBox="0 0 32 32" fill="none"><rect x="8" y="6" width="16" height="20" rx="3" fill="#c9a84c"/><rect x="11" y="10" width="10" height="2" rx="1" fill="#0a0a0f"/><rect x="11" y="18" width="10" height="2.5" rx="1.25" fill="#0a0a0f" opacity=".85"/></svg>
    Invoice<span>Free</span>
  </a>
  <div class="nav-right"><a href="register.html">No account? Sign up free &rarr;</a></div>
</nav>
<div class="wrap">
  <div class="card">
    <div class="title" data-i18n="login_title">Welcome back</div>
    <div class="subtitle" data-i18n="login_sub">Sign in to your InvoiceFree account</div>
    <button class="btn-google" id="btnGoogle" onclick="loginWithGoogle()">
      <svg viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      Sign in with Google
    </button>
    <div class="divider">or sign in with email</div>
    <div class="alert err" id="err"></div>
    <div class="alert ok" id="ok"></div>
    <div class="fg"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com" data-i18n="login_email" autocomplete="email"></div>
    <div class="fg">
      <div class="fg-row"><label>Password</label><a href="#" onclick="resetPassword();return false;">Forgot password?</a></div>
      <input type="password" id="pass" placeholder="Your password" data-i18n="login_pass" autocomplete="current-password" onkeydown="if(event.key==='Enter')emailLogin()">
    </div>
    <button class="btn-submit" data-i18n="login_btn" id="btnEmail" onclick="emailLogin()">Sign In &rarr;</button>
    <div class="auth-switch">No account? <a href="register.html">Create free account</a></div>
  </div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, sendPasswordResetEmail, signOut } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyC2EMpgQDWvXtBHSZpzVF2xJGTrFQOlO1o",
  authDomain: "invoicefree-login.firebaseapp.com",
  projectId: "invoicefree-login",
  storageBucket: "invoicefree-login.firebasestorage.app",
  messagingSenderId: "1070627464426",
  appId: "1:1070627464426:web:f868d3135acac55c4b6393"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// IMPORTANT: Sign out Firebase session so user can choose account each time
// This fixes "auto-login same account" bug
signOut(auth).catch(()=>{});

function promoExpiry(){const d=new Date();d.setMonth(d.getMonth()+3);return d.toISOString();}

function saveAndRedirect(firebaseUser){
  showLoading("Setting up your account...");
  const users=JSON.parse(localStorage.getItem("if_users")||"[]");
  let profile=users.find(u=>u.id===firebaseUser.uid||u.email===firebaseUser.email);
  if(!profile){
    profile={id:firebaseUser.uid,name:firebaseUser.displayName||firebaseUser.email.split("@")[0],email:firebaseUser.email,photoURL:firebaseUser.photoURL||"",role:"user",plan:"pro",promoExpiry:promoExpiry(),joined:new Date().toISOString().split("T")[0],invoiceCount:0};
    users.push(profile);
  } else {
    profile.id=firebaseUser.uid;
    profile.photoURL=firebaseUser.photoURL||profile.photoURL||"";
    const idx=users.findIndex(u=>u.email===firebaseUser.email);
    if(idx>-1)users[idx]=profile;
  }
  localStorage.setItem("if_users",JSON.stringify(users));
  localStorage.setItem("if_current_user",JSON.stringify(profile));
  setTimeout(()=>{window.location.href=profile.role==="admin"?"admin.html":"dashboard.html";},300);
}

window.loginWithGoogle=async function(){
  document.getElementById("btnGoogle").disabled=true;
  showLoading("Opening Google account picker...");
  try{
    // FORCE account selection every time — fixes auto-login bug
    const provider=new GoogleAuthProvider();
    provider.setCustomParameters({prompt:"select_account"});
    provider.addScope("email");
    provider.addScope("profile");
    const result=await signInWithPopup(auth,provider);
    saveAndRedirect(result.user);
  }catch(e){
    hideLoading();
    document.getElementById("btnGoogle").disabled=false;
    if(e.code==="auth/popup-closed-by-user"||e.code==="auth/cancelled-popup-request")return;
    if(e.code==="auth/popup-blocked"){showErr("Popup blocked! Allow popups for this site in your browser settings.");}
    else if(e.code==="auth/unauthorized-domain"){showErr("Domain not authorized. Add invoicefree.info in Firebase Console > Authentication > Settings > Authorized domains.");}
    else{showErr("Google login failed: "+e.message);}
  }
};

window.emailLogin=async function(){
  const email=document.getElementById("email").value.trim().toLowerCase();
  const pass=document.getElementById("pass").value;
  if(!email||!pass){showErr("Please enter your email and password.");return;}
  document.getElementById("btnEmail").disabled=true;
  showLoading("Signing you in...");
  try{
    const result=await signInWithEmailAndPassword(auth,email,pass);
    saveAndRedirect(result.user);
  }catch(e){
    hideLoading();document.getElementById("btnEmail").disabled=false;
    if(e.code==="auth/wrong-password"||e.code==="auth/user-not-found"||e.code==="auth/invalid-credential"){showErr("Incorrect email or password.");}
    else if(e.code==="auth/too-many-requests"){showErr("Too many attempts. Try again later or reset your password.");}
    else{showErr("Login failed: "+e.message);}
  }
};

window.resetPassword=async function(){
  const email=document.getElementById("email").value.trim();
  if(!email){showErr("Enter your email above then click Forgot password.");return;}
  try{await sendPasswordResetEmail(auth,email);showOk("Password reset email sent! Check your inbox.");}
  catch(e){showErr("Could not send reset email: "+e.message);}
};

// Hidden admin
(function(){
  const users=JSON.parse(localStorage.getItem("if_users")||"[]");
  if(!users.find(u=>u.role==="admin")){
    users.push({id:"admin_001",name:"Admin",email:"admin@invoicefree.info",password:"Adm!n#IF2025",role:"admin",plan:"pro",joined:new Date().toISOString().split("T")[0],invoiceCount:0});
    localStorage.setItem("if_users",JSON.stringify(users));
  }
})();

function showLoading(t){document.getElementById("loadingText").textContent=t||"Loading...";document.getElementById("loadingOverlay").classList.add("show");}
function hideLoading(){document.getElementById("loadingOverlay").classList.remove("show");}
function showErr(m){document.getElementById("err").textContent=m;document.getElementById("err").style.display="block";document.getElementById("ok").style.display="none";hideLoading();}
function showOk(m){document.getElementById("ok").textContent=m;document.getElementById("ok").style.display="block";document.getElementById("err").style.display="none";}
</script>
</body>
</html>
