<!DOCTYPE html>
<html lang="en">
<head>
<title>Admin — InvoiceFree.info</title>
<meta name="description" content="Admin panel.">
<meta name="robots" content="noindex,nofollow">
<link rel="canonical" href="https://invoicefree.info/admin.html">
<meta name="theme-color" content="#0a0a0f">
<meta property="og:type" content="website">
<meta property="og:url" content="https://invoicefree.info/admin.html">
<meta property="og:title" content="Admin">
<meta property="og:description" content="Admin panel.">
<meta property="og:image" content="https://invoicefree.info/og-image.png">
<meta property="og:site_name" content="InvoiceFree.info">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Admin">
<meta name="twitter:description" content="Admin panel.">
<meta name="twitter:image" content="https://invoicefree.info/og-image.png">
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">


<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cabinet+Grotesk:wght@400;500;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--ink:#0a0a0f;--ink2:#1c1c2e;--gold:#c9a84c;--gold2:#e8c97a;--mint:#1de9b6;--ember:#e85d26;--slate:#8892a4;--border:#e5e7eb;--surface:#f8f7f4;--ff:'Cabinet Grotesk',sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--ff);background:#f4f3ef;min-height:100vh}
.nav{background:var(--ink);padding:0 28px;display:flex;align-items:center;justify-content:space-between;height:58px;position:sticky;top:0;z-index:100}
.nav-logo{font-weight:900;font-size:1.2rem;color:white;text-decoration:none}.nav-logo span{color:var(--gold)}
.admin-pill{background:rgba(232,93,38,0.2);color:var(--ember);font-size:0.7rem;font-weight:800;padding:4px 10px;border-radius:50px;letter-spacing:0.08em}
.nav-btn{padding:7px 16px;border-radius:50px;font-family:var(--ff);font-weight:700;font-size:0.82rem;cursor:pointer;border:none;text-decoration:none;transition:all 0.2s;background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12)}
.layout{display:grid;grid-template-columns:220px 1fr;min-height:calc(100vh - 58px)}
.sidebar{background:var(--ink2);padding:24px 12px}
.sidebar-label{font-size:0.68rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:rgba(255,255,255,0.25);padding:12px 12px 6px}
.sidebar-nav{list-style:none}
.sidebar-nav li a,.sidebar-nav li button{display:flex;align-items:center;gap:10px;padding:10px 12px;color:rgba(255,255,255,0.55);text-decoration:none;border-radius:8px;font-size:0.88rem;font-weight:600;margin-bottom:2px;transition:all 0.2s;width:100%;background:none;border:none;cursor:pointer;text-align:left;font-family:var(--ff)}
.sidebar-nav li a:hover,.sidebar-nav li a.active,.sidebar-nav li button:hover,.sidebar-nav li button.active{background:rgba(255,255,255,0.08);color:white}
.sidebar-nav li a.active,.sidebar-nav li button.active{color:var(--gold)}
.main{padding:32px;overflow-y:auto;max-height:calc(100vh - 58px)}
.page-title{font-size:1.6rem;font-weight:900;letter-spacing:-0.04em;margin-bottom:28px;display:flex;align-items:center;gap:12px}
.page-title-badge{background:rgba(232,93,38,0.12);color:var(--ember);font-size:0.72rem;font-weight:800;padding:4px 10px;border-radius:50px}
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:white;border-radius:14px;padding:24px;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.sc-label{font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--slate);margin-bottom:8px}
.sc-value{font-family:'JetBrains Mono',monospace;font-size:1.8rem;font-weight:700;color:var(--ink)}
.sc-sub{font-size:0.78rem;color:var(--slate);margin-top:4px}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:12px}
.section-title{font-size:1rem;font-weight:800;letter-spacing:-0.02em}
.search-input{padding:8px 14px;border:1.5px solid var(--border);border-radius:50px;font-family:var(--ff);font-size:0.85rem;color:var(--ink);outline:none;transition:border-color 0.2s;width:220px}
.search-input:focus{border-color:var(--gold)}
.data-table{width:100%;border-collapse:collapse;background:white;border-radius:14px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.data-table th{background:var(--surface);padding:12px 16px;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--slate);text-align:left}
.data-table td{padding:14px 16px;font-size:0.88rem;border-bottom:1px solid #f3f4f6}
.data-table tr:last-child td{border:none}
.badge{display:inline-block;padding:3px 10px;border-radius:50px;font-size:0.72rem;font-weight:700}
.badge-paid{background:#d1fae5;color:#065f46}
.badge-pending{background:#fef3c7;color:#92400e}
.badge-free{background:#f3f4f6;color:var(--slate)}
.badge-pro{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-admin{background:rgba(232,93,38,0.12);color:var(--ember)}
.tbl-btn{background:none;border:none;font-family:var(--ff);font-weight:700;font-size:0.8rem;cursor:pointer;padding:4px 10px;border-radius:6px;transition:all 0.2s}
.tbl-btn-up{color:var(--mint)}.tbl-btn-up:hover{background:rgba(29,233,182,0.08)}
.tbl-btn-down{color:var(--slate)}.tbl-btn-down:hover{background:rgba(0,0,0,0.05)}
.tbl-btn-del{color:var(--ember)}.tbl-btn-del:hover{background:rgba(232,93,38,0.08)}
.tab-bar{display:flex;gap:4px;margin-bottom:20px;background:white;padding:6px;border-radius:12px;width:fit-content;box-shadow:0 1px 4px rgba(0,0,0,0.06)}
.tab-btn{padding:8px 16px;border-radius:8px;font-family:var(--ff);font-weight:700;font-size:0.82rem;cursor:pointer;border:none;background:none;color:var(--slate);transition:all 0.2s}
.tab-btn.active{background:var(--ink);color:white}
.empty-row td{text-align:center;color:var(--slate);padding:40px!important}
@media(max-width:800px){.layout{grid-template-columns:1fr}.sidebar{display:none}.stats-row{grid-template-columns:1fr 1fr}}

@media(prefers-reduced-motion:reduce){.reveal{opacity:1;transform:none}.hero-eyebrow,.hero-h1,.hero-sub,.hero-btns,.hero-preview,.stats-bar{animation:none;opacity:1;transform:none}}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">Invoice<span>Free</span></a>
  <div style="display:flex;align-items:center;gap:12px">
    <span class="admin-pill">🔐 ADMIN</span>
    <a href="index.html" class="nav-btn">View Site</a>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
</nav>
<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">Admin</div>
    <ul class="sidebar-nav">
      <li><button class="active" onclick="showSection('overview',this)">📊 Overview</button></li>
      <li><button onclick="showSection('users',this)">👥 All Users</button></li>
      <li><button onclick="showSection('free-users',this)">🆓 Free Users</button></li>
      <li><button onclick="showSection('pro-users',this)">⭐ Pro Users</button></li>
      <li><button onclick="showSection('invoices',this)">📄 Invoices</button></li>
    </ul>
    <div class="sidebar-label" style="margin-top:16px">System</div>
    <ul class="sidebar-nav">
      <li><a href="index.html">🌐 View Website</a></li>
      <li><a href="invoice-app.html">✏️ Invoice App</a></li>
      <li><button onclick="logout()">🚪 Logout</button></li>
    </ul>
  </aside>
  <main class="main" id="main-content">
    <!-- content injected by JS -->
  </main>
</div>
<script>
function getUsers(){return JSON.parse(localStorage.getItem('if_users')||'[]')}
function saveUsers(u){localStorage.setItem('if_users',JSON.stringify(u))}
function getInvoices(){return JSON.parse(localStorage.getItem('if_v2_invoices')||'[]')}
function getUser(){return JSON.parse(localStorage.getItem('if_current_user')||'null')}
function logout(){localStorage.removeItem('if_current_user');location.href='index.html'}

let currentSection='overview';

window.onload=function(){
  const u=getUser();
  if(!u||u.role!=='admin'){location.href='login.html';return}
  showSection('overview');
};

function showSection(section,btn){
  currentSection=section;
  document.querySelectorAll('.sidebar-nav button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const main=document.getElementById('main-content');

  const allUsers=getUsers().filter(u=>u.role!=='admin');
  const freeUsers=allUsers.filter(u=>u.plan==='free');
  const proUsers=allUsers.filter(u=>u.plan==='pro');
  const allInvoices=getInvoices();

  if(section==='overview'){
    main.innerHTML=`
      <h1 class="page-title">Admin Dashboard <span class="page-title-badge">🔐 ADMIN</span></h1>
      <div class="stats-row">
        <div class="stat-card"><div class="sc-label">Total Users</div><div class="sc-value">${allUsers.length}</div><div class="sc-sub">Registered</div></div>
        <div class="stat-card"><div class="sc-label">Free Users</div><div class="sc-value">${freeUsers.length}</div><div class="sc-sub">On free plan</div></div>
        <div class="stat-card"><div class="sc-label">Pro Users</div><div class="sc-value" style="color:var(--gold)">${proUsers.length}</div><div class="sc-sub" style="color:var(--mint)">Paying customers</div></div>
        <div class="stat-card"><div class="sc-label">Total Invoices</div><div class="sc-value">${allInvoices.length}</div><div class="sc-sub">All time</div></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-top:8px">
        <div>
          <div class="section-header"><span class="section-title">Recent Users</span></div>
          ${renderUsersTable(allUsers.slice(-5).reverse())}
        </div>
        <div>
          <div class="section-header"><span class="section-title">Recent Invoices</span></div>
          ${renderInvTable(allInvoices.slice(0,5))}
        </div>
      </div>
    `;
    return;
  }

  let usersToShow=allUsers;
  let title='All Users';
  if(section==='free-users'){usersToShow=freeUsers;title='Free Users'}
  if(section==='pro-users'){usersToShow=proUsers;title='Pro Users'}

  if(section==='invoices'){
    main.innerHTML=`
      <h1 class="page-title">All Invoices</h1>
      ${renderInvTable(allInvoices,true)}
    `;
    return;
  }

  main.innerHTML=`
    <h1 class="page-title">${title}</h1>
    <div class="section-header">
      <span class="section-title">${usersToShow.length} user${usersToShow.length!==1?'s':''}</span>
      <input class="search-input" placeholder="Search users..." oninput="filterUsers(this.value,'${section}')">
    </div>
    <div id="users-table-wrap">${renderUsersTable(usersToShow)}</div>
  `;
}

function renderUsersTable(users){
  if(!users.length)return'<table class="data-table"><tbody><tr class="empty-row"><td colspan="6">No users found</td></tr></tbody></table>';
  return`<table class="data-table">
    <thead><tr><th>Name</th><th>Email</th><th>Plan</th><th>Joined</th><th>Invoices</th><th>Actions</th></tr></thead>
    <tbody>${users.map(u=>`
      <tr>
        <td><strong>${u.name}</strong></td>
        <td style="color:var(--slate)">${u.email}</td>
        <td><span class="badge badge-${u.plan}">${u.plan.toUpperCase()}</span></td>
        <td style="color:var(--slate)">${u.joined||'—'}</td>
        <td style="font-family:'JetBrains Mono',monospace">${u.invoiceCount||0}</td>
        <td style="display:flex;gap:4px;flex-wrap:wrap">
          ${u.plan==='free'
            ?`<button class="tbl-btn tbl-btn-up" onclick="upgradeUser('${u.id}')">⬆ Pro</button>`
            :`<button class="tbl-btn tbl-btn-down" onclick="downgradeUser('${u.id}')">⬇ Free</button>`}
          <button class="tbl-btn tbl-btn-del" onclick="deleteUser('${u.id}')">🗑 Delete</button>
        </td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function renderInvTable(invoices,full){
  const users=getUsers();
  if(!invoices.length)return'<table class="data-table"><tbody><tr class="empty-row"><td colspan="5">No invoices yet</td></tr></tbody></table>';
  return`<table class="data-table">
    <thead><tr><th>Invoice #</th><th>Client</th><th>Amount</th><th>Date</th><th>Status</th></tr></thead>
    <tbody>${invoices.map(inv=>`
      <tr>
        <td><strong>${inv.number}</strong></td>
        <td>${inv.client||'—'}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-weight:600">${inv.total}</td>
        <td style="color:var(--slate)">${inv.date||'—'}</td>
        <td><span class="badge badge-${inv.status==='paid'?'paid':'pending'}">${inv.status.toUpperCase()}</span></td>
      </tr>
    `).join('')}</tbody>
  </table>`;
}

function filterUsers(q,section){
  const allUsers=getUsers().filter(u=>u.role!=='admin');
  let users=section==='free-users'?allUsers.filter(u=>u.plan==='free'):section==='pro-users'?allUsers.filter(u=>u.plan==='pro'):allUsers;
  const filtered=q?users.filter(u=>u.name.toLowerCase().includes(q.toLowerCase())||u.email.toLowerCase().includes(q.toLowerCase())):users;
  const wrap=document.getElementById('users-table-wrap');
  if(wrap)wrap.innerHTML=renderUsersTable(filtered);
}

function upgradeUser(id){
  let users=getUsers();
  const i=users.findIndex(u=>u.id===id);
  if(i>-1){users[i].plan='pro';saveUsers(users);showSection(currentSection);}
}
function downgradeUser(id){
  if(!confirm('Downgrade to Free?'))return;
  let users=getUsers();
  const i=users.findIndex(u=>u.id===id);
  if(i>-1){users[i].plan='free';saveUsers(users);showSection(currentSection);}
}
function deleteUser(id){
  if(!confirm('Delete this user permanently?'))return;
  let users=getUsers().filter(u=>u.id!==id);
  saveUsers(users);
  showSection(currentSection);
}

// Fallback: show all content if IntersectionObserver fails
setTimeout(function(){
  document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('visible');});
}, 800);
</script>
</body>
</html>
