<script>
// CURSOR
const cur=document.getElementById('cursor'),ring=document.getElementById('cursorRing');
let mx=0,my=0,rx=0,ry=0;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cur.style.left=mx+'px';cur.style.top=my+'px'});
(function anim(){rx+=(mx-rx)*.12;ry+=(my-ry)*.12;ring.style.left=rx+'px';ring.style.top=ry+'px';requestAnimationFrame(anim)})();
document.querySelectorAll('a,button').forEach(el=>{
  el.addEventListener('mouseenter',()=>{cur.style.width='18px';cur.style.height='18px';ring.style.width='54px';ring.style.height='54px'});
  el.addEventListener('mouseleave',()=>{cur.style.width='10px';cur.style.height='10px';ring.style.width='36px';ring.style.height='36px'});
});
// NAVBAR
window.addEventListener('scroll',()=>document.getElementById('navbar').classList.toggle('scrolled',scrollY>40));
// SCROLL REVEAL
const ro=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')}),{threshold:.1});
document.querySelectorAll('.reveal').forEach(el=>ro.observe(el));
// COUNT-UP
function animCount(el,target,suffix,isDecimal){
  const dur=2200,start=performance.now();
  function fmt(n){if(target>=1000000)return(n/1000000).toFixed(1);if(target>=1000)return Math.round(n/1000);return isDecimal?n.toFixed(1):Math.round(n)}
  (function step(now){
    const p=Math.min((now-start)/dur,1),e=1-Math.pow(1-p,4),v=target*e;
    el.innerHTML=fmt(v)+'<span class="sfx">'+suffix+'</span>';
    if(p<1)requestAnimationFrame(step);
    else el.innerHTML=fmt(target)+'<span class="sfx">'+suffix+'</span>';
  })(start);
}
const statsObs=new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting){
      animCount(document.getElementById('s1'),50000,'K+',false);
      animCount(document.getElementById('s2'),2400000,'M+',false);
      animCount(document.getElementById('s3'),4.9,'★',true);
      document.getElementById('s4').textContent='0';
      statsObs.disconnect();
    }
  });
},{threshold:.5});
const sb=document.querySelector('.stats-bar');if(sb)statsObs.observe(sb);
// COUNTDOWN
(function(){
  let end=localStorage.getItem('if_promo_end');
  if(!end){const d=new Date();d.setDate(d.getDate()+7);end=d.getTime();localStorage.setItem('if_promo_end',end);}
  function tick(){
    const diff=Math.max(0,end-Date.now());
    const pad=n=>String(Math.floor(n)).padStart(2,'0');
    document.getElementById('pcd-d').textContent=pad(diff/86400000);
    document.getElementById('pcd-h').textContent=pad((diff%86400000)/3600000);
    document.getElementById('pcd-m').textContent=pad((diff%3600000)/60000);
    document.getElementById('pcd-s').textContent=pad((diff%60000)/1000);
  }
  tick();setInterval(tick,1000);
})();

// Fallback: show all content if IntersectionObserver fails
setTimeout(function(){
  document.querySelectorAll('.reveal').forEach(function(el){el.classList.add('visible');});
}, 800);
</script>
